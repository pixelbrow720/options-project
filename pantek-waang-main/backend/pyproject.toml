[tool.ruff]
line-length = 110
target-version = "py311"
extend-exclude = ["app/db/migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501", "B008"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]
addopts = "-q --strict-markers"
markers = [
    "integration: end-to-end tests that require a live Postgres / TimescaleDB",
    "property: hypothesis-based property tests (may be slow on first run)",
]
