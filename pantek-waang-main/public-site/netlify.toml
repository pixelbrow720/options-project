[build]
  base    = "public-site"
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "public-site/dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_BASE_URL = "https://api.flowoptionid.is-a.dev"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
