# Production setup options for FlowOptionID:
#   1. Co-host with backend behind one reverse proxy (Caddy/Traefik):
#      flowoptionid.is-a.dev   → public-site:80
#      api.flowoptionid.is-a.dev → backend:8000
#   2. Free hosting:
#      • Netlify  → drop public-site/dist (static), set VITE_API_BASE_URL at build time
#      • Vercel   → same, configure via Project Settings → Environment Variables
#      • Cloudflare Pages → wrangler deploy
#   For local dev, the docker-compose `public-site` service serves on port 3001.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
