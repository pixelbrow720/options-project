server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers (apply to all responses) ────────────────────────────
    # CSP: tight allow-list. connect-src includes localhost dev origins for
    # local builds; production deployments should override via a build-time
    # template or reverse-proxy. frame-ancestors 'none' blocks clickjacking.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self' http://localhost:8000 ws://localhost:8000; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # SPA fallback: any unknown path serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
