services:
  - type: web
    name: pantek-waang-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SUPPORTED_SYMBOLS
        value: SPXW,NDXP
      - key: DISABLE_LIVE_INGESTION
        value: "true"
      - key: DISABLE_HISTORICAL_BACKFILL
        value: "true"
      - key: ENABLE_OPENAPI_DOCS
        value: "true"
      - key: PUBLIC_CORS_ORIGINS
        sync: false
      - key: ADMIN_CORS_ORIGINS
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: DISCORD_INVITE_URL
        value: "https://discord.gg/dy78P5vP62"
      - key: PUBLIC_SESSION_JWT_SECRET
        generateValue: true
    healthCheckPath: /health
